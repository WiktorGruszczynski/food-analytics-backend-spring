spring:
  application:
    name: foodbudget-backend-spring

  autoconfigure:
    exclude: com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration

  cloud:
    gcp:
      sql:
        enabled: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration


  jpa:
    open-in-view: false
    show-sql: ${DEBUG_SQL:false}
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          from: ${MAIL_USERNAME}
          auth: true
          starttls:
            enable: true

server:
  port: 8080



---

spring:
  application:
    name: foodbudget-backend-spring

  config:
    activate:
      on-profile: "prod"

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    open-in-view: false
    show-sql: ${DEBUG_SQL:false}
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          from: ${MAIL_USERNAME}
          auth: true
          starttls:
            enable: true

server:
  forward-headers-strategy: framework
  port: 8080
